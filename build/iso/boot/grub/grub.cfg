set timeout_style=menu
set timeout=-1
set default=0

# Prefer a higher-res linear framebuffer for a more modern UI.
insmod all_video
insmod gfxterm
terminal_output gfxterm
loadfont /boot/grub/smileos.pf2
set gfxterm_font=smileos
set gfxmode=1280x720x32,1366x768x32,1024x768x32,auto
set gfxpayload=keep

menuentry "smileOS" {
    echo "Press Enter to boot smileOS"
    multiboot2 /boot/kernel.bin
    boot
}
